<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Box Estoque</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-body">
    <div class="login-box">
        <div class="login-header">
            <img src="assets/img/logo.webp" alt="Logo" class="login-logo">
            <h1>Box Estoque</h1>
            <p>Controle de estoque com QR Code</p>
        </div>
        <form id="login-form" class="login-form">
            <div id="login-alerta"></div>
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="login-user" placeholder="Digite seu usuario" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="login-pass" placeholder="Digite sua senha" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="btn-login">Entrar</button>
        </form>
        <div class="login-footer">Box Estoque v3.0 &middot; Seguro</div>
    </div>
    <script>
    (function() {
        const token = localStorage.getItem('token');
        if (token) {
            fetch('api/check', { credentials: 'same-origin', headers: { 'Authorization': 'Bearer ' + token } })
                .then(r => r.json())
                .then(d => { if (d.autenticado) window.location.href = 'index.html'; else localStorage.removeItem('token'); })
                .catch(() => localStorage.removeItem('token'));
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const a = document.getElementById('login-alerta');
            btn.disabled = true; btn.textContent = 'Entrando...';
            try {
                const res = await fetch('api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({
                        usuario: document.getElementById('login-user').value.trim(),
                        senha: document.getElementById('login-pass').value
                    })
                });
                const r = await res.json();
                if (res.ok && r.ok) {
                    if (r.token) localStorage.setItem('token', r.token);
                    window.location.href = 'index.html';
                } else {
                    a.innerHTML = '<div class="alert-error">' + (r.erro || 'Erro ao fazer login') + '</div>';
                    setTimeout(() => a.innerHTML = '', 4000);
                }
            } catch (err) {
                a.innerHTML = '<div class="alert-error">Erro de conexao</div>';
                setTimeout(() => a.innerHTML = '', 4000);
            }
            btn.disabled = false; btn.textContent = 'Entrar';
        });
    })();
    </script>
</body>
</html>
